name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run artifact build and verification jobs without publishing a GitHub release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    name: Release unpublished crate
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.release_plz.outputs.releases }}
      releases_created: ${{ steps.release_plz.outputs.releases_created }}
      should_build_artifacts: ${{ steps.release_mode.outputs.should_build_artifacts }}
      should_publish_artifacts: ${{ steps.release_mode.outputs.should_publish_artifacts }}
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release-plz release
        id: release_plz
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
          version: 0.3.158
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release mode
        id: release_mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "should_build_artifacts=true" >> "$GITHUB_OUTPUT"
            echo "should_publish_artifacts=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build_artifacts=${{ steps.release_plz.outputs.releases_created }}" >> "$GITHUB_OUTPUT"
            echo "should_publish_artifacts=${{ steps.release_plz.outputs.releases_created }}" >> "$GITHUB_OUTPUT"
          fi

  release-pr:
    name: Create or update release PR
    needs: release
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release-plz release-pr
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
          version: 0.3.158
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-artifacts:
    name: Build release artifacts
    needs: release
    if: needs.release.outputs.should_build_artifacts == 'true'
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    uses: ./.github/workflows/release-artifacts.yml
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
      publish_artifacts: ${{ fromJSON(needs.release.outputs.should_publish_artifacts) }}

  publish-deb:
    name: Publish Debian package
    needs:
      - release
      - release-artifacts
    if: needs.release.outputs.should_publish_artifacts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Debian package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: debian-package
          path: dist/debian

      - name: Upload Debian package to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ fromJSON(needs.release.outputs.releases)[0].tag }}
          files: |
            dist/debian/*.deb
            dist/debian/*.cdx.json
          fail_on_unmatched_files: true

  publish-static-binary:
    name: Publish static release binary
    needs:
      - release
      - release-artifacts
    if: needs.release.outputs.should_publish_artifacts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download static binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-binary-x86_64-unknown-linux-musl
          path: dist/static

      - name: Upload static binary to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ fromJSON(needs.release.outputs.releases)[0].tag }}
          files: |
            dist/static/*.tar.gz
            dist/static/*.cdx.json
          fail_on_unmatched_files: true
