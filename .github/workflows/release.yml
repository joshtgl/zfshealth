name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run artifact build and verification jobs without publishing a GitHub release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    name: Release unpublished crate
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.release_plz.outputs.releases }}
      releases_created: ${{ steps.release_plz.outputs.releases_created }}
      should_build_artifacts: ${{ steps.release_mode.outputs.should_build_artifacts }}
      should_publish_artifacts: ${{ steps.release_mode.outputs.should_publish_artifacts }}
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release-plz release
        id: release_plz
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
          version: 0.3.158
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release mode
        id: release_mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "should_build_artifacts=true" >> "$GITHUB_OUTPUT"
            echo "should_publish_artifacts=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build_artifacts=${{ steps.release_plz.outputs.releases_created }}" >> "$GITHUB_OUTPUT"
            echo "should_publish_artifacts=${{ steps.release_plz.outputs.releases_created }}" >> "$GITHUB_OUTPUT"
          fi

  release-pr:
    name: Create or update release PR
    needs: release
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release-plz release-pr
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
          version: 0.3.158
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-nix:
    name: Verify Nix packaging
    needs: release
    if: needs.release.outputs.should_build_artifacts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Verify flake outputs
        run: nix flake check

  build-deb:
    name: Build Debian package
    needs: release
    if: needs.release.outputs.should_build_artifacts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-deb
        run: cargo install cargo-deb --version 3.0.0 --locked

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build Debian package
        run: cargo deb --no-build

      - name: Locate Debian package
        id: deb_asset
        run: |
          set -euxo pipefail
          DEB_PATH="$(echo target/debian/*.deb)"
          test -f "$DEB_PATH"
          echo "deb_path=$DEB_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate Debian SBOM
        id: deb_sbom
        env:
          SBOM_BASE_NAME: zfshealth-debian-package.cdx
        run: |
          set -euxo pipefail
          cargo cyclonedx --format json --override-filename "$SBOM_BASE_NAME"
          test -f "$SBOM_BASE_NAME.json"
          echo "sbom_path=$SBOM_BASE_NAME.json" >> "$GITHUB_OUTPUT"

      - name: Attest Debian provenance
        id: attest_provenance
        if: needs.release.outputs.should_publish_artifacts == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.deb_asset.outputs.deb_path }}

      - name: Attest Debian SBOM
        id: attest_sbom
        if: needs.release.outputs.should_publish_artifacts == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.deb_asset.outputs.deb_path }}
          sbom-path: ${{ steps.deb_sbom.outputs.sbom_path }}

      - name: Report attestation URLs
        if: needs.release.outputs.should_publish_artifacts == 'true'
        run: |
          echo "Provenance attestation: ${{ steps.attest_provenance.outputs.attestation-url }}"
          echo "SBOM attestation: ${{ steps.attest_sbom.outputs.attestation-url }}"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debian-package
          path: |
            ${{ steps.deb_asset.outputs.deb_path }}
            ${{ steps.deb_sbom.outputs.sbom_path }}
          if-no-files-found: error

  build-static-binary:
    name: Build static release binary
    needs: release
    if: needs.release.outputs.should_build_artifacts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Verify Zig installation
        run: zig version

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --version 0.23.0 --locked

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Build static musl binary
        run: cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Create static binary archive
        id: static_asset
        run: |
          set -euxo pipefail
          tar -C target/x86_64-unknown-linux-musl/release -czf zfshealth-x86_64-unknown-linux-musl.tar.gz zfshealth
          echo "binary_path=zfshealth-x86_64-unknown-linux-musl.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Generate static binary SBOM
        id: static_sbom
        run: |
          set -euxo pipefail
          cargo cyclonedx --format json --target x86_64-unknown-linux-musl --override-filename zfshealth-x86_64-unknown-linux-musl.cdx
          test -f zfshealth-x86_64-unknown-linux-musl.cdx.json
          echo "sbom_path=zfshealth-x86_64-unknown-linux-musl.cdx.json" >> "$GITHUB_OUTPUT"

      - name: Attest binary provenance
        id: attest_provenance
        if: needs.release.outputs.should_publish_artifacts == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.static_asset.outputs.binary_path }}

      - name: Attest binary SBOM
        id: attest_sbom
        if: needs.release.outputs.should_publish_artifacts == 'true'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.static_asset.outputs.binary_path }}
          sbom-path: ${{ steps.static_sbom.outputs.sbom_path }}

      - name: Report attestation URLs
        if: needs.release.outputs.should_publish_artifacts == 'true'
        run: |
          echo "Provenance attestation: ${{ steps.attest_provenance.outputs.attestation-url }}"
          echo "SBOM attestation: ${{ steps.attest_sbom.outputs.attestation-url }}"

      - name: Upload static binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-binary-x86_64-unknown-linux-musl
          path: |
            ${{ steps.static_asset.outputs.binary_path }}
            ${{ steps.static_sbom.outputs.sbom_path }}
          if-no-files-found: error

  publish-deb:
    name: Publish Debian package
    needs:
      - release
      - build-deb
      - verify-nix
    if: needs.release.outputs.should_publish_artifacts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Debian package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: debian-package
          path: target/debian

      - name: Upload Debian package to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ fromJSON(needs.release.outputs.releases)[0].tag }}
          files: |
            target/debian/*.deb
            target/debian/*.cdx.json
          fail_on_unmatched_files: true

  publish-static-binary:
    name: Publish static release binary
    needs:
      - release
      - build-static-binary
      - verify-nix
    if: needs.release.outputs.should_publish_artifacts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download static binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-binary-x86_64-unknown-linux-musl
          path: dist

      - name: Upload static binary to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ fromJSON(needs.release.outputs.releases)[0].tag }}
          files: |
            dist/*.tar.gz
            dist/*.cdx.json
          fail_on_unmatched_files: true
