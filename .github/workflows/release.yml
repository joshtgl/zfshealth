name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release unpublished crate
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.release_plz.outputs.releases }}
      releases_created: ${{ steps.release_plz.outputs.releases_created }}
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release-plz release
        id: release_plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
          version: 0.3.158
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-pr:
    name: Create or update release PR
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release-plz release-pr
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
          version: 0.3.158
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deb:
    name: Build Debian package
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-deb
        run: cargo install cargo-deb --version 3.0.0 --locked

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Build Debian package
        run: cargo deb --no-build

      - name: Prepare Debian assets
        id: prepare_assets
        run: |
          DEB_PATH="$(echo target/debian/*.deb)"
          test -f "$DEB_PATH"
          cargo cyclonedx --format json --override-filename zfshealth-debian-package
          test -f zfshealth-debian-package.cdx.json
          echo "deb_path=$DEB_PATH" >> "$GITHUB_OUTPUT"
          echo "sbom_path=zfshealth-debian-package.cdx.json" >> "$GITHUB_OUTPUT"

      - name: Attest Debian provenance
        id: attest_provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.prepare_assets.outputs.deb_path }}

      - name: Attest Debian SBOM
        id: attest_sbom
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.prepare_assets.outputs.deb_path }}
          sbom-path: ${{ steps.prepare_assets.outputs.sbom_path }}

      - name: Report attestation URLs
        run: |
          echo "Provenance attestation: ${{ steps.attest_provenance.outputs.attestation-url }}"
          echo "SBOM attestation: ${{ steps.attest_sbom.outputs.attestation-url }}"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debian-package
          path: |
            ${{ steps.prepare_assets.outputs.deb_path }}
            zfshealth-debian-package.cdx.json
          if-no-files-found: error

  build-static-binary:
    name: Build static release binary
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-musl

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Verify Zig installation
        run: zig version

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --version 0.20.1 --locked

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Build static musl binary
        run: cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Prepare binary assets
        id: prepare_assets
        run: |
          tar -C target/x86_64-unknown-linux-musl/release -czf zfshealth-x86_64-unknown-linux-musl.tar.gz zfshealth
          cargo cyclonedx --format json --target x86_64-unknown-linux-musl --override-filename zfshealth-x86_64-unknown-linux-musl.cdx
          test -f zfshealth-x86_64-unknown-linux-musl.cdx.json
          echo "binary_path=zfshealth-x86_64-unknown-linux-musl.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sbom_path=zfshealth-x86_64-unknown-linux-musl.cdx.json" >> "$GITHUB_OUTPUT"

      - name: Attest binary provenance
        id: attest_provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.prepare_assets.outputs.binary_path }}

      - name: Attest binary SBOM
        id: attest_sbom
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.prepare_assets.outputs.binary_path }}
          sbom-path: ${{ steps.prepare_assets.outputs.sbom_path }}

      - name: Report attestation URLs
        run: |
          echo "Provenance attestation: ${{ steps.attest_provenance.outputs.attestation-url }}"
          echo "SBOM attestation: ${{ steps.attest_sbom.outputs.attestation-url }}"

      - name: Upload static binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: static-binary-x86_64-unknown-linux-musl
          path: |
            ${{ steps.prepare_assets.outputs.binary_path }}
            ${{ steps.prepare_assets.outputs.sbom_path }}
          if-no-files-found: error

  publish-deb:
    name: Publish Debian package
    needs:
      - release
      - build-deb
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Debian package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: debian-package
          path: target/debian

      - name: Upload Debian package to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ fromJSON(needs.release.outputs.releases)[0].tag }}
          files: |
            target/debian/*.deb
            target/debian/*.cdx.json
          fail_on_unmatched_files: true

  publish-static-binary:
    name: Publish static release binary
    needs:
      - release
      - build-static-binary
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download static binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-binary-x86_64-unknown-linux-musl
          path: dist

      - name: Upload static binary to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ fromJSON(needs.release.outputs.releases)[0].tag }}
          files: |
            dist/*.tar.gz
            dist/*.cdx.json
          fail_on_unmatched_files: true
